# App + Redis only. SQLite file is stored in ./data (mounted for persistence).
services:
  redis:
    image: redis:7-alpine
    container_name: problem-5-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: problem-5-app
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: dev
      SQLITE_DATABASE: /app/data/app.sqlite
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  sqlite_data:
