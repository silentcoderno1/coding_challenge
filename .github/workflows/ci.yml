# Runs tests on pushes and PRs to main. Enable branch protection:
# Settings → Branches → Add rule for `main` → Require status checks → select "test".

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (problem-5)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: problem-5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: problem-5/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
